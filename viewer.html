      let inputString = String(dInput)
      let output = "";
      let separator = ','
      for (let i = inputString.length - 1; i > -1; i--) {
        output = String(dInput).charAt(i) + output;

        if (cnt % 3 == 0 && i != 0) output = "," + output;

            )
          }
        }
      }
      $('.ansAText').text(qna.a)
      $('.ansBText').text(qna.b)
      $('.ansCText').text(qna.c)
      $('.ansDText').text(qna.d)
    })

    socket.on('playSound', sound => {
      console.log(sound)
      playSound(sound)
    })
    socket.on('stopBed', quesNum => {
      if (quesNum == 7) {
        q8Bed.fade(1, 0, 250)
      }
      else if (quesNum == 8) {
        q9Bed.fade(1, 0, 250)
      }
      else if (quesNum == 9) {
        q10Bed.fade(1, 0, 250)
      }
      else if (quesNum == 10) {
        q11Bed.fade(1, 0, 250)
      }
      else if (quesNum == 11) {
        q12Bed.fade(1, 0, 250)
      }
    })
    socket.on('resumeBed', quesNum => {
      if (quesNum == 7) {
        q8Bed.stop()
        q8Bed.play()
        q8Bed.fade(0, 1, 250)
      }
      else if (quesNum == 8) {
        q9Bed.stop()
        q9Bed.play()
        q9Bed.fade(0, 1, 250)
      }
      else if (quesNum == 9) {
        q10Bed.stop()
        q10Bed.play()
        q10Bed.fade(0, 1, 250)
      }
      else if (quesNum == 10) {
        q11Bed.stop()
        q11Bed.play()
        q11Bed.fade(0, 1, 250)
      }
      else if (quesNum == 11) {
        q12Bed.stop()
        q12Bed.play()
        q12Bed.fade(0, 1, 250)
      }
    })
    socket.on('explainRules', () => {
      rulesSound.play()
    })
    socket.on('letsPlay', () => {
      rulesSound.fade(1, 0, 500, () => {
        rulesSound.stop()
      })
      playSound('Q611 Start.mp3')
    })
    socket.on('pafBed', () => {
      pafBed.play()
    })
    socket.on('pafTime', () => {
      pafVideo.currentTime = 1
      pafVideo.onseeked = function () {
        pafVideo.play()
        $('#paf').animate({ scale: .35 }, 500)
        pafVideo.onseeked = null // Remove listener
        pafTime.play()
        pafBed.stop()
        setTimeout(() => {
          $('#paf').animate({ scale: 0 }, 500)
        }, 30000)
      }
    })
    socket.on('pafEnd', () => {
      pafTime.stop()
      playSound('Phone-a-Friend_End.ogg')
      $('#paf').animate({ scale: 0 }, 500)
    })

    socket.on('disableLifeline', ll => {
      if (ll == '50:50') $(`#cross1`).css('opacity', 1)
      else if (ll == 'phone') $(`#cross2`).css('opacity', 1)
      else if (ll == 'ata') $(`#cross3`).css('opacity', 1)
      else if (ll == 'swap') $(`#cross4`).css('opacity', 1)
    })
    socket.on('enableLifeline', ll => {
      if (ll == '50:50') $(`#cross1`).css('opacity', 0)
      else if (ll == 'phone') $(`#cross2`).css('opacity', 0)
      else if (ll == 'ata') $(`#cross3`).css('opacity', 0)
      else if (ll == 'swap') $(`#cross4`).css('opacity', 0)
    })
  </script>
</body>

</html>
