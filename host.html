  <script>
    const socket = io('/h');
    let timeInterval
    let time

    function digitGroup(dInput) {
      let inputString = String(dInput)
      let output = "";
      let separator = ','
      for (let i = inputString.length - 1; i > -1; i--) {
        output = String(dInput).charAt(i) + output;
        let cnt = String(dInput).length - i;
        if (cnt % 3 == 0 && i != 0) output = "," + output;
      }
      console.log(output)
      return output;
    }

    function countRenderedLines(element) { const range = document.createRange(); range.selectNodeContents(element); const rects = range.getClientRects(); return rects.length; }
    socket.on('showQ', qna => {
      $('#explainText').text('')
      $('#quesText,svg').css('display', 'none')
      //if only 1 line
      let isHaveBr = false
      $('#quesText').css({ 'display': 'flex', 'opacity': 1 })
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD').css('display', 'initial')
      if (qna.ql2 == '') {
        $('#quesText').html(qna.ql1)
      }
      //if 2 lines
      else {
        isHaveBr = true
        $('#quesText').html(`${qna.ql1}<br>${qna.ql2}`)
      }
      console.log(countRenderedLines(document.getElementById('quesText')))
      if (isHaveBr == true) {
        if (countRenderedLines(document.getElementById('quesText')) >= 4) {
          console.log(countRenderedLines(document.getElementById('quesText')))
          $('#quesText').css('display', 'none')
          let ql1Length = qna.ql1.length
          let ql2Length = qna.ql2.length
          let line1GlyphLength = 1440 / ql1Length
          let line2GlyphLength = 1440 / ql2Length
          if (line1GlyphLength < line2GlyphLength) {
            $('#qna').append(
              `
              <svg style='display:initial'>
                <text id='quesTextTop' style='fill:white; text-anchor:middle' x='720' y='55' textLength="1440"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql1}</text>
                <text id='quesTextBot' style='fill:white; text-anchor:middle' x='720' y='105' textLength="${line1GlyphLength * ql2Length}"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql2}</text>
              </svg>
              `
            )
          }
          else {
            $('#qna').append(
              `
              <svg style='display:initial'>
                <text id='quesTextTop' style='fill:white; text-anchor:middle' x='720' y='55' textLength="${line2GlyphLength * ql1Length}"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql1}</text>
                <text id='quesTextBot' style='fill:white; text-anchor:middle' x='720' y='105' textLength="1440"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql2}</text>
              </svg>
              `
            )
          }
        }
      }
      $('#ansTextA').text(qna.a)
      $('#ansTextB').text(qna.b)
      $('#ansTextC').text(qna.c)
      $('#ansTextD').text(qna.d)
      if (countRenderedLines(document.getElementById('ansTextA')) >= 2) {
        $('#ansTextA').css('display', 'none')
        let glyphLength = 630 / qna.a.length
        $('#qna').append(
          `
          <svg id='svgAText' style='display:initial;width: 630px;left: 280px;top: 140px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.a}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextB')) >= 2) {
        $('#ansTextB').css('display', 'none')
        let glyphLength = 630 / qna.b.length
        $('#qna').append(
          `
          <svg id='svgBText' style='display:initial;width: 630px;left: 1060px;top: 140px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.b}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextC')) >= 2) {
        $('#ansTextC').css('display', 'none')
        let glyphLength = 630 / qna.c.length
        $('#qna').append(
          `
          <svg id='svgCText' style='display:initial;width: 630px;left: 280px;top: 217px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.c}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextD')) >= 2) {
        $('#ansTextD').css('display', 'none')
        let glyphLength = 630 / qna.d.length
        $('#qna').append(
          `
          <svg id='svgDText' style='display:initial;width: 630px;left: 1060px;top: 217px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.d}</text>
          </svg>
          `
        )
      }
    })
    socket.on('showAnsTier1', () => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,.loz,#timer15sCountdown,#svgAText,#svgBText,#svgCText,#svgDText').css('opacity', 1)
      time = 15
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
        if (time == 0) {
          clearInterval(timeInterval)
          $('#time').text('')
        }
      }, 1000)
    })
    socket.on('showAnsTier2', () => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,.loz,#timer15sCountdown,#svgAText,#svgBText,#svgCText,#svgDText').css('opacity', 1)
      time = 30
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
        if (time == 0) {
          clearInterval(timeInterval)
          $('#time').text('')
        }
      }, 1000)
    })
    socket.on('showA', () => {
      $('#ansTextA').css('opacity', 1)
    })
    socket.on('showB', () => {
      $('#ansTextB').css('opacity', 1)
    })
    socket.on('showC', () => {
      $('#ansTextC').css('opacity', 1)
    })
    socket.on('showD', () => {
      $('#ansTextD').css('opacity', 1)
    })
    socket.on('choose', (ans, correctAns, explain) => {
      clearInterval(timeInterval)
      if (ans == 'A') $('.chosen').addClass('a')
      else if (ans == 'B') $('.chosen').addClass('b')
      else if (ans == 'C') $('.chosen').addClass('c')
      else if (ans == 'D') $('.chosen').addClass('d')

      $('#ataFrame p:nth-child(1),#ataFrame p:nth-child(2),#ataFrame p:nth-child(3),#ataFrame p:nth-child(4)').text('')
      $('#correctAns').text(correctAns)
      if (ans != correctAns) $('#redWrong').css('opacity', 1)
      else $('#greenCorrect').css('opacity', 1)
      $('#correctAns').text(correctAns)
      $('#explainText').text(explain)
    })
    socket.on('revealCorrect', (chosenAns, correctAns, quesNum, prize, isMuted) => {
      if (correctAns == 'A') $('.correct').addClass('a')
      else if (correctAns == 'B') $('.correct').addClass('b')
      else if (correctAns == 'C') $('.correct').addClass('c')
      else if (correctAns == 'D') $('.correct').addClass('d')

      if (!isMuted) {
        $('#highlight img').css('opacity', 0)
        if (chosenAns != correctAns) {
          if (quesNum == 0 || quesNum == 1) return
          else if (quesNum >= 2 && quesNum <= 6) $('#highlight2').css('opacity', 1)
          else if (quesNum >= 7 && quesNum <= 11) $('#highlight7').css('opacity', 1)
        }
        else if (quesNum == 11) {
          $('#highlight12').css('opacity', 1)
        }
        else $('#highlight' + (quesNum + 1)).css('opacity', 1)
      }
    })
    socket.on('nextQuestion', (quesNum) => {
      $('#quesText,#ansTextA,#ansTextB,#ansTextC,#ansTextD,#svgAText,#svgBText,#svgCText,#svgDText,#redWrong,#greenCorrect').css('opacity', 0)
      $('#correctAns,#time,#explainText').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
    })
    socket.on('updatePrizeInfo', (prizeInfo, quesNum) => {
      $('#away').text('Còn: ' + prizeInfo[0])
      $('#orange').text(digitGroup(prizeInfo[1]) + ' GL' == 'n,ull GL' ? '0 GL' : digitGroup(prizeInfo[1]) + ' GL')
      $('#green').text(digitGroup(prizeInfo[3]) + ' GL')
      $('#red').text(digitGroup(prizeInfo[4]) + ' GL')
      $('#lblue').text(digitGroup(prizeInfo[5]) + ' GL' == 'n,ull GL' ? '0 GL' : digitGroup(prizeInfo[5]) + ' GL')
      $('#highlight img').css('opacity', 0)
      $('#highlight' + (quesNum)).css('opacity', 1)
      if (quesNum == 12) {
        $('#away').text('Còn: 0')
        $('#orange').text('1,000,000 GL')
        $('#green,#red,#lblue').text('')
      }
    })

    socket.on('playerInfo', msg => {
      console.log(msg)
      $('#playerInfo').text(msg)
    })
    socket.on('message', msg => {
      let date = new Date()
      console.log(msg)
      if (msg) $('#message').text('(' + date.getHours() + ':' + date.getMinutes() + ':' + date.getSeconds() + ') ' + msg)
    })

    socket.on('fifty', ans => {
      $('#ansText' + ans[0]).text('')
      $('#ansText' + ans[1]).text('')
    })
    socket.on('pafBed', () => {
    })
    let pafTime = 30
    socket.on('pafTime', () => {
      $('#time').text(pafTime)
      $('#time').css('opacity', 1)
      timeInterval = setInterval(() => {
        $('#time').text(--pafTime)
        if (pafTime == 0) {
          clearInterval(timeInterval)
          $('#time').text('')
        }
      }, 1000)
    })
    socket.on('pafEnd', () => {
      clearInterval(timeInterval)
      $('#time').text('')
    })

    socket.on('stqQuestion', qna => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,#redWrong,#greenCorrect,#quesText').css('opacity', 0)
      $('#correctAns,#time,#explainText,#quesText').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
      $('#explainText').text('')
      $('#quesText,svg').css('display', 'none')
      //if only 1 line
      let isHaveBr = false
      $('#quesText').css({ 'display': 'flex', 'opacity': 1 })
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD').css('display', 'initial')
      if (qna.ql2 == '') {
        $('#quesText').html(qna.ql1)
      }
      //if 2 lines
      else {
        isHaveBr = true
        $('#quesText').html(`${qna.ql1}<br>${qna.ql2}`)
      }
      console.log(countRenderedLines(document.getElementById('quesText')))
      if (isHaveBr == true) {
        if (countRenderedLines(document.getElementById('quesText')) >= 4) {
          console.log(countRenderedLines(document.getElementById('quesText')))
          $('#quesText').css('display', 'none')
          let ql1Length = qna.ql1.length
          let ql2Length = qna.ql2.length
          let line1GlyphLength = 1440 / ql1Length
          let line2GlyphLength = 1440 / ql2Length
          if (line1GlyphLength < line2GlyphLength) {
            $('#qna').append(
              `
              <svg style='display:initial'>
                <text id='quesTextTop' style='fill:white; text-anchor:middle' x='720' y='55' textLength="1440"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql1}</text>
                <text id='quesTextBot' style='fill:white; text-anchor:middle' x='720' y='105' textLength="${line1GlyphLength * ql2Length}"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql2}</text>
              </svg>
              `
            )
          }
          else {
            $('#qna').append(
              `
              <svg style='display:initial'>
                <text id='quesTextTop' style='fill:white; text-anchor:middle' x='720' y='55' textLength="${line2GlyphLength * ql1Length}"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql1}</text>
                <text id='quesTextBot' style='fill:white; text-anchor:middle' x='720' y='105' textLength="1440"
                  lengthAdjust="spacingAndGlyphs;font-family:Verdana">${qna.ql2}</text>
              </svg>
              `
            )
          }
        }
      }
      $('#ansTextA').text(qna.a)
      $('#ansTextB').text(qna.b)
      $('#ansTextC').text(qna.c)
      $('#ansTextD').text(qna.d)
      if (countRenderedLines(document.getElementById('ansTextA')) >= 2) {
        $('#ansTextA').css('display', 'none')
        let glyphLength = 630 / qna.a.length
        $('#qna').append(
          `
          <svg id='svgAText' style='display:initial;width: 630px;left: 280px;top: 140px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.a}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextB')) >= 2) {
        $('#ansTextB').css('display', 'none')
        let glyphLength = 630 / qna.b.length
        $('#qna').append(
          `
          <svg id='svgBText' style='display:initial;width: 630px;left: 1060px;top: 140px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.b}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextC')) >= 2) {
        $('#ansTextC').css('display', 'none')
        let glyphLength = 630 / qna.c.length
        $('#qna').append(
          `
          <svg id='svgCText' style='display:initial;width: 630px;left: 280px;top: 217px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.c}</text>
          </svg>
          `
        )
      }
      if (countRenderedLines(document.getElementById('ansTextD')) >= 2) {
        $('#ansTextD').css('display', 'none')
        let glyphLength = 630 / qna.d.length
        $('#qna').append(
          `
          <svg id='svgDText' style='display:initial;width: 630px;left: 1060px;top: 217px;height:54px;position:absolute;opacity:0'>
            <text textLength="630" y='43' lengthAdjust="spacingAndGlyphs" style='fill:white;font-family:Verdana'>${qna.d}</text>
          </svg>
          `
        )
      }
    })

    socket.on('disableLifeline', ll => {
      if (ll == '50:50') $('#fiftyUsed').css('opacity', 1)
      else if (ll == 'phone') $('#phoneUsed').css('opacity', 1)
      else if (ll == 'ata') $('#ataUsed').css('opacity', 1)
      else if (ll == 'swap') $('#swapUsed').css('opacity', 1)
    })
    socket.on('enableLifeline', ll => {
      if (ll == '50:50') $('#fiftyUsed').css('opacity', 0)
      else if (ll == 'phone') $('#phoneUsed').css('opacity', 0)
      else if (ll == 'ata') $('#ataUsed').css('opacity', 0)
      else if (ll == 'swap') $('#swapUsed').css('opacity', 0)
    })
    socket.on('stopClock', () => {
      clearInterval(timeInterval)
    })
    socket.on('resumeClock', () => {
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
        if (time == 0) {
          clearInterval(timeInterval)
          $('#time').text('')
        }
      }, 1000)
    })
    socket.on('ataUpdate', (howManyAns, percentages) => {
      $('#ataFrame p:nth-child(1)').text('A. ' + howManyAns[0] + ' (' + percentages[0] + '%)')
      $('#ataFrame p:nth-child(2)').text('B. ' + howManyAns[1] + ' (' + percentages[1] + '%)')
      $('#ataFrame p:nth-child(3)').text('C. ' + howManyAns[2] + ' (' + percentages[2] + '%)')
      $('#ataFrame p:nth-child(4)').text('D. ' + howManyAns[3] + ' (' + percentages[3] + '%)')
    })

    socket.on('showTotalPrize', totalPrize => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,#redWrong,#greenCorrect').css('opacity', 0)
      $('#correctAns').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
      $('#quesText').html(`THẮNG CUỘC<br>${totalPrize} GL`)
    })
    socket.on('hideTotalPrize', () => {
      $('#quesText').text('')
    })
    socket.on('walkAway', () => {
      clearInterval(timeInterval)
    })
    socket.on('clearAnim', () => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,#redWrong,#greenCorrect').css('opacity', 0)
      $('#correctAns,#time,#explainText,#quesText').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
      $('#highlight img').css('opacity', 0)
      $('#away').text('')
      $('#orange').text('')
      $('#green').text('')
      $('#red').text('')
      $('#lblue').text('')
      $('#highlight img').css('opacity', 0)
    })
  </script>
</body>

</html>
