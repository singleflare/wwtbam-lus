  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io('/h');
    let timeInterval
    let time

    function digitGroup(dInput) {
      let inputString = String(dInput)
      let output = "";
      let separator = ','
      for (let i = inputString.length - 1; i > -1; i--) {
        output = String(dInput).charAt(i) + output;
        let cnt = String(dInput).length - i;
        if (cnt % 3 == 0 && i != 0) output = "," + output;
      }
      console.log(output)
      return output;
    }

    socket.on('showQ', qna => {
      $('#explainText').text('')
      $('#quesText').css('opacity', 1)
      $('#quesText').text(qna.ql1 + qna.ql2)
      $('#ansTextA').text(qna.a)
      $('#ansTextB').text(qna.b)
      $('#ansTextC').text(qna.c)
      $('#ansTextD').text(qna.d)
    })
    socket.on('showAnsTier1', () => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD').css('opacity', 1)
      time = 15
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
      }, 1000)
    })
    socket.on('showAnsTier2', () => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD').css('opacity', 1)
      time = 30
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
      }, 1000)
    })
    socket.on('showA', () => {
      $('#ansTextA').css('opacity', 1)
    })
    socket.on('showB', () => {
      $('#ansTextB').css('opacity', 1)
    })
    socket.on('showC', () => {
      $('#ansTextC').css('opacity', 1)
    })
    socket.on('showD', () => {
      $('#ansTextD').css('opacity', 1)
    })
    socket.on('choose', (ans, correctAns, explain) => {
      clearInterval(timeInterval)
      if (ans == 'A') $('.chosen').addClass('a')
      else if (ans == 'B') $('.chosen').addClass('b')
      else if (ans == 'C') $('.chosen').addClass('c')
      else if (ans == 'D') $('.chosen').addClass('d')

      $('#ataFrame p:nth-child(1),#ataFrame p:nth-child(2),#ataFrame p:nth-child(3),#ataFrame p:nth-child(4)').text('')
      $('#correctAns').text(correctAns)
      if (ans != correctAns) $('#redWrong').css('opacity', 1)
      else $('#greenCorrect').css('opacity', 1)
      $('#correctAns').text(correctAns)
      $('#explainText').text(explain)
    })
    socket.on('revealCorrect', (correctAns, quesNum) => {
      if (correctAns == 'A') $('.correct').addClass('a')
      else if (correctAns == 'B') $('.correct').addClass('b')
      else if (correctAns == 'C') $('.correct').addClass('c')
      else if (correctAns == 'D') $('.correct').addClass('d')

      $('#highlight img').css('opacity', 0)
      $('#highlight' + (quesNum + 1)).css('opacity', 1)
    })
    socket.on('nextQuestion', (quesNum) => {
      $('#quesText,#ansTextA,#ansTextB,#ansTextC,#ansTextD,#redWrong,#greenCorrect').css('opacity', 0)
      $('#correctAns').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
    })
    socket.on('updatePrizeInfo', (prizeInfo, quesNum) => {
      $('#away').text('Còn: ' + prizeInfo[0])
      $('#orange').text(digitGroup(prizeInfo[1]) + ' GL' == 'n,ull GL' ? '0 GL' : digitGroup(prizeInfo[1]) + ' GL')
      $('#green').text(digitGroup(prizeInfo[3]) + ' GL')
      $('#red').text(digitGroup(prizeInfo[4]) + ' GL')
      $('#lblue').text(digitGroup(prizeInfo[5]) + ' GL' == 'n,ull GL' ? '0 GL' : digitGroup(prizeInfo[5]) + ' GL')
      $('#highlight img').css('opacity', 0)
      $('#highlight' + (quesNum)).css('opacity', 1)
    })

    socket.on('playerInfo', msg => {
      console.log(msg)
      $('#playerInfo').text(msg)
    })
    socket.on('message', msg => {
      console.log(msg)
      $('#message').text('(' + Date() + ') ' + msg)
    })
    socket.on('pafBed', () => {
    })
    let pafTime = 30
    socket.on('pafTime', () => {
      $('#time').text(pafTime)
      $('#time').css('opacity', 1)
      timeInterval = setInterval(() => {
        $('#time').text(--pafTime)
        if (pafTime == 0) {
          clearInterval(timeInterval)
          $('#time').text('')
        }
      }, 1000)
    })
    socket.on('pafEnd', () => {
      clearInterval(timeInterval)
      $('#time').text('')
    })
    socket.on('disableLifeline', ll => {
      if (ll == '50:50') $('#fiftyUsed').css('opacity', 1)
      else if (ll == 'phone') $('#phoneUsed').css('opacity', 1)
      else if (ll == 'ata') $('#ataUsed').css('opacity', 1)
      else if (ll == 'swap') $('#swapUsed').css('opacity', 1)
    })
    socket.on('enableLifeline', ll => {
      if (ll == '50:50') $('#fiftyUsed').css('opacity', 0)
      else if (ll == 'phone') $('#phoneUsed').css('opacity', 0)
      else if (ll == 'ata') $('#ataUsed').css('opacity', 0)
      else if (ll == 'swap') $('#swapUsed').css('opacity', 0)
    })
    socket.on('stopClock', () => {
      clearInterval(timeInterval)
    })
    socket.on('resumeClock', () => {
      $('#time').text(time)
      timeInterval = setInterval(() => {
        $('#time').text(--time)
      }, 1000)
    })
    socket.on('ataUpdate', (howManyAns, percentages) => {
      $('#ataFrame p:nth-child(1)').text('A. ' + howManyAns[0] + ' (' + percentages[0] + '%)')
      $('#ataFrame p:nth-child(2)').text('B. ' + howManyAns[1] + ' (' + percentages[1] + '%)')
      $('#ataFrame p:nth-child(3)').text('C. ' + howManyAns[2] + ' (' + percentages[2] + '%)')
      $('#ataFrame p:nth-child(4)').text('D. ' + howManyAns[3] + ' (' + percentages[3] + '%)')
    })

    socket.on('showTotalPrize', totalPrize => {
      $('#ansTextA,#ansTextB,#ansTextC,#ansTextD,#redWrong,#greenCorrect').css('opacity', 0)
      $('#correctAns').text('')
      $('.chosen').removeClass('a b c d')
      $('.correct').removeClass('a b c d')
      $('#quesText').html(`THẮNG CUỘC<br>${totalPrize} GL`)
    })
    socket.on('hideTotalPrize', () => {
      $('#quesText').text('')
    })
    socket.on('walkAway', () => {
      clearInterval(timeInterval)
    })
  </script>
