<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

<body>
  <style>
    * {
      color: white;
      box-sizing: border-box;
      font-size: 30px;
    }

    body {
      background-color: black;
      width: 1920px;
      height: 1080px;
      margin: auto;
      top: 0;
      position: absolute;
      right: 0;
      bottom: 0;
      left: 0;
      overflow: hidden;
    }

    button {
      border: 1px solid white;
      background-color: black;
      height: 60px;
    }

    button:disabled {
      opacity: .5;
      pointer-events: none;
    }

    .flexcon {
      display: flex;
    }

    .flexcon>* {
      width: 100%;
    }

    .controlLabel {
      width: 100%;
      color: black;
      background-color: white;
      text-align: center;
    }

    #fileInput {
      display: none;
    }

    .customFileInput {
      display: inline-block;
      cursor: pointer;
      width: 100%;
      text-align: center;
      border: 1px solid white;
    }

    .singleLine {
      width: 100%;
    }

    .purple {
      background-color: blueviolet;
    }

    input {
      color: black;
    }

    #questionArea>* {
      height: 70px;
    }

    #questionArea textarea {
      color: black;
      font-size: 25px;
      height: 60px;
      resize: none;
      vertical-align: top;
      width: 539px;
      font-family: Arial;
    }

    #questionArea button {
      vertical-align: top;
    }

    #questionNumList>*,
    #moneyList>*,
    #questionList>* {}

    #questionList>* {
      width: 210px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
      color: black
    }

    #ques,
    #ansA,
    #ansB,
    #ansC,
    #ansD {
      background-color: gray;
    }

    input[type='checkbox'] {
      height: 30px;
      width: 30px;
      opacity: 0;
      z-index: 1;
    }

    input[type='checkbox']:checked~.checkmark {
      background-color: green;
    }

    input[type='checkbox']~.checkmark {
      background-color: red;
    }
  </style>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script type="text/javascript" src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    let quesNum = 0
    let chosenAns
    let prizeIdx = 0
    let prizeInfo = []
    document.getElementById('fileInput').onchange = function () {
      var fileName = this.value.split('\\').pop();
      document.querySelector('.customFileInput').textContent = fileName;
    };
    const socket = io('/c');
    $('#introMoneyTree').click(() => {
      socket.emit('introMoneyTree')
    })
    $('#introSafe1').click(() => {
      socket.emit('introSafe1')
    })
    $('#introSafe2').click(() => {
      socket.emit('introSafe2')
    })
    $('#introSafe3').click(() => {
      socket.emit('introSafe3')
    })
    $('#introLifeline1').click(() => {
      socket.emit('introLifeline1')
    })
    $('#introLifeline2').click(() => {
      socket.emit('introLifeline2')
    })
    $('#introLifeline3').click(() => {
      socket.emit('introLifeline3')
    })
    $('#introLifeline4').click(() => {
      socket.emit('introLifeline4')
    })

    $('#showMoneyTree').click(() => {
      socket.emit('showMoneyTree', quesNum)
    })
    $('#hideMoneyTree').click(() => {
      socket.emit('hideMoneyTree')
    })
    $('#showQ').click(() => {
      $('#ques').css('background-color', 'white')
      if (quesNum >= 0 && quesNum <= 6) {
        $('#showA, #showB, #showC, #showD').prop('disabled', true)
        $('#showAllAns').prop('disabled', false)
      }
      else {
        $('#showA, #showB, #showC, #showD').prop('disabled', false)
        $('#showAllAns').prop('disabled', true)
      }
      console.log(quesNum)
      socket.emit('showQ', qnas[quesNum], quesNum)
    })
    $('#showAllAns').click(() => {
      $('#ansA, #ansB, #ansC, #ansD').css('background-color', 'white')
      $('#chooseA, #chooseB, #chooseC, #chooseD').prop('disabled', false)
      if (quesNum == 0 || quesNum == 1) socket.emit('showAnsTier1')
      else if (quesNum >= 2 && quesNum <= 6) socket.emit('showAnsTier2', quesNum)
    })
    $('#showA').click(() => {
      $('#ansA').css('background-color', 'white')
      $('#showA').prop('disabled', true)
      $('#showB').prop('disabled', false)
      socket.emit('showA')
    })
    $('#showB').click(() => {
      $('#ansB').css('background-color', 'white')
      $('#showB').prop('disabled', true)
      $('#showC').prop('disabled', false)
      socket.emit('showB')
    })
    $('#showC').click(() => {
      $('#ansC').css('background-color', 'white')
      $('#showC').prop('disabled', true)
      $('#showD').prop('disabled', false)
      socket.emit('showC')
    })
    $('#showD').click(() => {
      $('#ansD').css('background-color', 'white')
      $('#showD').prop('disabled', true)
      $('#chooseA,#chooseB,#chooseC,#chooseD').prop('disabled', false)
      socket.emit('showD')
    })
    let ans = ['A', 'B', 'C', 'D']
    ans.forEach(element => {
      $('#choose' + element).click(() => {
        chosenAns = element
        socket.emit('choose', element, quesNum, false, qnas[quesNum].correct, qnas[quesNum].explain)
        $('#revealCorrect').prop('disabled', false)
      })
      $('#stq' + element).click(() => {
        chosenAns = element
        socket.emit('choose', element, quesNum, true, qnas[quesNum].correct, qnas[quesNum].explain)
      })
    })
    $('#revealCorrect').click(() => {
      socket.emit('revealCorrect', chosenAns, qnas[quesNum].correct, quesNum, prizes[quesNum], false)
      if (qnas[quesNum].correct == chosenAns) {
        prizeIdx = quesNum
        quesNum++
        prizeInfo[0] = 12 - quesNum
        prizeInfo[1] = prizes[quesNum - 1]
        prizeInfo[2] = qnas[quesNum].correct
        prizeInfo[3] = prizes[quesNum]
        if (quesNum <= 1) prizeInfo[4] = 0
        else if (quesNum >= 2 && quesNum <= 6) prizeInfo[4] = prizes[1]
        else if (quesNum >= 7 && quesNum <= 11) prizeInfo[4] = prizes[6]
        if (quesNum <= 1) prizeInfo[5] = prizes[quesNum - 1]
        else if (quesNum >= 2 && quesNum <= 6) prizeInfo[5] = prizes[quesNum - 1] - prizes[1]
        else if (quesNum >= 7 && quesNum <= 11) prizeInfo[5] = prizes[quesNum - 1] - prizes[6]
        socket.emit('updatePrizeInfo', prizeInfo, quesNum)

      } else {
        if (quesNum <= 1) prizeIdx = -1
        else if (quesNum >= 2 && quesNum <= 6) prizeIdx = 1
        else if (quesNum >= 7 && quesNum <= 11) prizeIdx = 6
      }
    })
    $('#nextQuestion').click(() => {
      $('#ques,#ansA, #ansB, #ansC, #ansD').css('background-color', 'gray')
      $('#showQ').prop('disabled', false)
      $('#showAllAns,#showA, #showB, #showC, #showD,#chooseA,#chooseB,#chooseC,#chooseD,#revealCorrect').prop('disabled', true)
      socket.emit('nextQuestion', quesNum, prizeInfo)

    let ataInterval
    $('#ata').click(() => {
      socket.emit('ata')
      let correctAns = qnas[quesNum].correct
      let correctAnsIdx = ['A', 'B', 'C', 'D'].indexOf(correctAns)
      let howManyAns = [0, 0, 0, 0]
      let ansPercentages = [0, 0, 0, 0]
      let probabilities = [0, 0, 0, 0]
      for (let i = 0; i < 4; i++) {
        probabilities[i] = Math.round((1 - correctRate[quesNum]) / 3 * 100) / 100
      }
      probabilities[correctAnsIdx] = correctRate[quesNum]
      console.log(probabilities)

      let id = 1
      ataInterval = setInterval(() => {
        var num = Math.random();
        if (num < probabilities[0]) howManyAns[0]++;
        else if (num < probabilities[0] + probabilities[1]) howManyAns[1]++;
        else if (num < probabilities[0] + probabilities[1] + probabilities[2]) howManyAns[2]++;
        else howManyAns[3]++;
        ansPercentages = howManyAns.map(x => Math.round((x / id) * 100))
        socket.emit('ataUpdate', howManyAns, ansPercentages)
        if (id == 100) {
          clearInterval(ataInterval)
          socket.emit('ataEnd', ansPercentages)
        }
        id++
      }, 100)
    })
    $('#ataEnd').click(() => {
      clearInterval(ataInterval)

    let correctRate = [.9, .9, .75, .6, .45, .3, .3, .25, .25, .25, .25, .25]

    $('#fileInput').on('change', async (e) => {
      const file = e.target.files[0]
      const data = await file.arrayBuffer()
      const workbook = XLSX.read(data)
      const sheet = workbook.Sheets[workbook.SheetNames[0]]
      let row
      // Helper function to safely get cell 
      const getCellValue = (sheet, col, row) => {
        const cell = sheet[XLSX.utils.encode_cell({ c: col, r: row })]
        return cell ? cell.v : ''
      }
      for (let i = 2; i <= 26; i += 2) {
        console.log(i, getCellValue(sheet, 1, i), getCellValue(sheet, 1, i + 1))

        if ((i / 2) == 13) $(`#questionList div:nth-child(${i / 2})`).text(`Đổi. ${getCellValue(sheet, 1, i) + getCellValue(sheet, 1, i + 1)}`)
        else $(`#questionList div:nth-child(${i / 2})`).text(`${getCellValue(sheet, 1, i) + getCellValue(sheet, 1, i + 1)}`)

        if ((i / 2) == 1 || (i / 2) == 2) $(`#questionList div:nth-child(${(i / 2)})`).css('background-color', '#B6D7A8')
        else if ((i / 2) >= 3 && (i / 2) <= 7 || (i / 2) == 13) $(`#questionList div:nth-child(${(i / 2)})`).css('background-color', '#FFE599')
        else if ((i / 2) >= 8 && (i / 2) <= 12) $(`#questionList div:nth-child(${(i / 2)})`).css('background-color', '#EA9999')
        else $(`#questionList div:nth-child(${(i / 2)})`).css('background-color', '#ff0000cc')

        qnas[(i / 2) - 1].ql1 = getCellValue(sheet, 1, i)
        qnas[(i / 2) - 1].ql2 = getCellValue(sheet, 1, i + 1)
        qnas[(i / 2) - 1].a = getCellValue(sheet, 2, i)
        qnas[(i / 2) - 1].b = getCellValue(sheet, 3, i)
        qnas[(i / 2) - 1].c = getCellValue(sheet, 4, i)
        qnas[(i / 2) - 1].d = getCellValue(sheet, 5, i)
        qnas[(i / 2) - 1].correct = getCellValue(sheet, 6, i)
        qnas[(i / 2) - 1].explain = getCellValue(sheet, 7, i)
        $(`#questionList div:nth-child(${i / 2})`).click(() => {
          $('#ques,#ansA, #ansB, #ansC, #ansD').css('background-color', 'gray')
          $('#showQ').prop('disabled', false)
          $('#showAllAns,#showA, #showB, #showC, #showD,#chooseA,#chooseB,#chooseC,#chooseD,#revealCorrect').prop('disabled', true)

          $('#ansB').text(qnas[(i / 2) - 1].b)

          $('#ansD').text(qnas[(i / 2) - 1].d)
          $('#explain').text(qnas[(i / 2) - 1].explain)
          $('#quesNum').text(i / 2)
          if ((i / 2) == 13) $('#quesNum').text('Đổi')
          quesNum = (i / 2) - 1
          let prizeInfo = []
          prizeInfo[0] = 12 - quesNum
          prizeInfo[1] = prizes[quesNum - 1] == undefined ? 0 : prizes[quesNum - 1]
          prizeInfo[2] = qnas[quesNum].correct
          prizeInfo[3] = prizes[quesNum]
          if (quesNum <= 1) prizeInfo[4] = 0
          else if (quesNum >= 2 && quesNum <= 6) prizeInfo[4] = prizes[1]
          else if (quesNum >= 7 && quesNum <= 11) prizeInfo[4] = prizes[6]
          if (quesNum == 0) prizeInfo[5] = 0
          else if (quesNum <= 1) prizeInfo[5] = prizes[quesNum - 1]
          else if (quesNum >= 2 && quesNum <= 6) prizeInfo[5] = prizes[quesNum - 1] - prizes[1]
          else if (quesNum >= 7 && quesNum <= 11) prizeInfo[5] = prizes[quesNum - 1] - prizes[6]

          socket.emit('updatePrizeInfo', prizeInfo, quesNum)
        })
      }
      console.log(qnas)
